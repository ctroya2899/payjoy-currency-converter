<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayJoy Currency Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      height: 560px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      background: #ffffff;
      color: #2f3438;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 3px solid #8DC63F;
      flex-shrink: 0;
    }

    .chat-header img { height: 26px; }
    .chat-header h1 { font-size: 1.05rem; font-weight: 600; color: #2f3438; }
    .chat-header p { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }

    #n8n-chat {
      flex: 1;
      min-height: 0;
    }

    .setup-banner {
      margin: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #fff8e6;
      color: #7a5b00;
      font-size: 0.85rem;
      line-height: 1.45;
      border: 1px solid #f2d98b;
    }

    .setup-banner code {
      display: block;
      margin-top: 8px;
      padding: 8px;
      background: #fff;
      border-radius: 8px;
      font-size: 0.78rem;
      word-break: break-all;
    }

    /* PayJoy theme overrides for @n8n/chat */
    :root {
      --chat--color-primary: #8DC63F;
      --chat--color-primary-shade-50: #7ab52f;
      --chat--color-primary-shade-100: #6aa328;
      --chat--color-secondary: #2f3438;
      --chat--color-secondary-shade-50: #3d4449;
      --chat--color-white: #ffffff;
      --chat--color-light: #eef7e2;
      --chat--color-light-shade-50: #e2f0d4;
      --chat--color-light-shade-100: #d4e6c0;
      --chat--color-dark: #2f3438;
      --chat--color-disabled: #9ca3af;
      --chat--message--bot--background: #eef7e2;
      --chat--message--bot--color: #2f3438;
      --chat--message--user--background: #2f3438;
      --chat--message--user--color: #ffffff;
      --chat--toggle--background: #8DC63F;
      --chat--toggle--color: #2f3438;
      --chat--toggle--active--background: #7ab52f;
      --chat--header--background: #ffffff;
      --chat--header--color: #2f3438;
      --chat--window--width: 100%;
      --chat--window--height: 100%;
      --chat--border-radius: 0;
    }

    #n8n-chat .chat-header { display: none; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="chat-header">
      <img src="payjoy-logo.png" alt="PayJoy" />
      <div>
        <h1>Currency Assistant</h1>
        <p>AI-powered conversion to local currency</p>
      </div>
    </div>

    <div id="setup-banner" class="setup-banner" hidden>
      Configure your n8n webhook in
      <strong>docs/demo/chat-config.js</strong>
      and redeploy GitHub Pages.
      <code id="setup-example"></code>
    </div>

    <div id="n8n-chat"></div>
  </div>

  <script src="chat-config.js"></script>
  <script type="module">
    const webhookUrl = (window.N8N_WEBHOOK_URL || "").trim();

    if (!webhookUrl) {
      document.getElementById("setup-banner").hidden = false;
      document.getElementById("setup-example").textContent =
        'window.N8N_WEBHOOK_URL = "https://yourname.app.n8n.cloud/webhook/.../chat";';
    } else {
      const { createChat } = await import(
        "https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js"
      );

      createChat({
        webhookUrl,
        target: "#n8n-chat",
        mode: "fullscreen",
        showWelcomeScreen: false,
        loadPreviousSession: true,
        enableStreaming: false,
        initialMessages: [
          "Hi! I'm PayJoy's currency assistant.",
          'Ask me anything like "How much is 200 dollars in Brazilian reais?"',
        ],
        i18n: {
          en: {
            title: "PayJoy Assistant",
            subtitle: "Currency conversion powered by AI",
            footer: "",
            getStarted: "New conversation",
            inputPlaceholder: "Type your question...",
          },
        },
      });
    }
  </script>
</body>
</html>
