<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayJoy Currency Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      height: 600px;
      background: #111b21;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      background: #202c33;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #8DC63F;
      flex-shrink: 0;
    }

    .chat-header img {
      height: 24px;
      background: #ffffff;
      border-radius: 6px;
      padding: 3px 6px;
    }
    .chat-header h1 { font-size: 1rem; font-weight: 600; color: #e9edef; }
    .chat-header p { font-size: 0.75rem; color: #8DC63F; margin-top: 2px; }

    #n8n-chat {
      flex: 1;
      min-height: 0;
    }

    /* WhatsApp-style dark theme for @n8n/chat */
    :root {
      --chat--color-primary: #8DC63F;
      --chat--color-primary-shade-50: #7ab52f;
      --chat--color-primary-shade-100: #6aa328;
      --chat--color-secondary: #005c4b;
      --chat--color-secondary-shade-50: #00695a;
      --chat--color-white: #e9edef;
      --chat--color-light: #202c33;
      --chat--color-light-shade-50: #2a3942;
      --chat--color-light-shade-100: #334049;
      --chat--color-medium: #3b4a54;
      --chat--color-dark: #0b141a;
      --chat--color-disabled: #667781;
      --chat--color-typing: #8696a0;

      /* chat body */
      --chat--body--background: #0b141a;

      /* bot bubbles: dark gray, light text */
      --chat--message--bot--background: #202c33;
      --chat--message--bot--color: #e9edef;

      /* user bubbles: WhatsApp green, light text */
      --chat--message--user--background: #005c4b;
      --chat--message--user--color: #e9edef;

      --chat--message--font-size: 0.9rem;
      --chat--message--padding: 10px 14px;
      --chat--message--border-radius: 10px;

      /* input area */
      --chat--input--background: #2a3942;
      --chat--input--text-color: #e9edef;
      --chat--input--placeholder--color: #8696a0;
      --chat--input--send--button--background: transparent;
      --chat--input--send--button--color: #8DC63F;
      --chat--input--send--button--background-hover: transparent;
      --chat--input--send--button--color-hover: #a5d95f;
      --chat--input--border: none;

      --chat--header--background: #202c33;
      --chat--header--color: #e9edef;
      --chat--window--width: 100%;
      --chat--window--height: 100%;
      --chat--border-radius: 0;
    }

    /* hide n8n's own header, keep only the chat */
    #n8n-chat .chat-header { display: none; }
    #n8n-chat .chat-powered-by,
    #n8n-chat [class*="powered"] { display: none; }

    /* dark background for chat body and input */
    #n8n-chat .chat-body,
    #n8n-chat .chat-messages-list,
    #n8n-chat .chat-layout {
      background: #0b141a;
    }

    #n8n-chat .chat-input,
    #n8n-chat .chat-inputs {
      background: #202c33;
      border-top: 1px solid #2a3942;
    }

    #n8n-chat textarea,
    #n8n-chat input {
      background: #2a3942 !important;
      color: #e9edef !important;
      border-radius: 8px;
    }

    #n8n-chat textarea::placeholder { color: #8696a0; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="chat-header">
      <img src="payjoy-logo.png" alt="PayJoy" />
      <div>
        <h1>Currency Assistant</h1>
        <p>online</p>
      </div>
    </div>

    <div id="n8n-chat"></div>
  </div>

  <script src="chat-config.js"></script>
  <script type="module">
    const webhookUrl = (window.N8N_WEBHOOK_URL || "").trim();

    const { createChat } = await import(
      "https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js"
    );

    createChat({
      webhookUrl,
      target: "#n8n-chat",
      mode: "fullscreen",
      showWelcomeScreen: false,
      loadPreviousSession: false,
      enableStreaming: false,
      initialMessages: [
        "Hi! I'm PayJoy's currency assistant.",
        'Ask me anything like "How much is 200 dollars in Brazilian reais?"',
      ],
      i18n: {
        en: {
          title: "",
          subtitle: "",
          footer: "",
          getStarted: "New conversation",
          inputPlaceholder: "Type a message",
        },
      },
    });
  </script>
</body>
</html>
